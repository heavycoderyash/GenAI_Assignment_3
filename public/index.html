<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NotebookLM Clone</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <style>
        :root {
            --primary: #2563EB;
            --primary-hover: #1D4ED8;
            --bg-color: #F3F4F6;
            --surface: #FFFFFF;
            --text-main: #111827;
            --text-muted: #6B7280;
            --border: #E5E7EB;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            height: 100vh;
        }

        .app-container {
            width: 100%;
            max-width: 800px;
            display: flex;
            flex-direction: column;
            padding: 2rem;
            gap: 1.5rem;
        }

        h1 {
            text-align: center;
            font-size: 1.8rem;
            font-weight: 600;
            margin: 0;
            color: var(--text-main);
        }

        .upload-card {
            background: var(--surface);
            padding: 1.5rem;
            border-radius: 16px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .upload-card input[type="file"] {
            flex: 1;
            padding: 0.5rem;
            border: 1px dashed #9CA3AF;
            border-radius: 8px;
            cursor: pointer;
            color: var(--text-muted);
        }

        button {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            font-weight: 500;
            font-family: inherit;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        button:hover {
            background-color: var(--primary-hover);
        }

        button:disabled {
            background-color: #9CA3AF;
            cursor: not-allowed;
        }

        .status-text {
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-top: 0.5rem;
        }

        .chat-card {
            background: var(--surface);
            border-radius: 16px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            border: 1px solid var(--border);
            display: none;
            flex-direction: column;
            height: 500px;
            overflow: hidden;
        }

        .chat-history {
            flex: 1;
            padding: 1.5rem;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .chat-history::-webkit-scrollbar {
            width: 6px;
        }

        .chat-history::-webkit-scrollbar-thumb {
            background: #D1D5DB;
            border-radius: 4px;
        }

        .message-row {
            display: flex;
            width: 100%;
        }

        .message-row.user {
            justify-content: flex-end;
        }

        .message-row.ai {
            justify-content: flex-start;
        }

        .bubble {
            max-width: 80%;
            padding: 1rem 1.25rem;
            border-radius: 16px;
            font-size: 0.95rem;
            line-height: 1.5;
        }

        .bubble.user {
            background-color: var(--primary);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .bubble.ai {
            background-color: var(--bg-color);
            color: var(--text-main);
            border-bottom-left-radius: 4px;
            border: 1px solid var(--border);
        }

        .markdown-body p {
            margin: 0 0 0.75rem 0;
        }

        .markdown-body p:last-child {
            margin: 0;
        }

        .markdown-body ul,
        .markdown-body ol {
            margin: 0 0 0.75rem 0;
            padding-left: 1.5rem;
        }

        .markdown-body strong {
            color: #111827;
        }

        .chat-input-area {
            padding: 1rem 1.5rem;
            border-top: 1px solid var(--border);
            display: flex;
            gap: 1rem;
            background: var(--surface);
        }

        .chat-input-area input {
            flex: 1;
            padding: 0.75rem 1rem;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-family: inherit;
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.2s;
        }

        .chat-input-area input:focus {
            border-color: var(--primary);
        }

        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 0.5rem;
            align-items: center;
        }

        .dot {
            width: 6px;
            height: 6px;
            background-color: #9CA3AF;
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }

        .dot:nth-child(1) {
            animation-delay: -0.32s;
        }

        .dot:nth-child(2) {
            animation-delay: -0.16s;
        }

        @keyframes bounce {

            0%,
            80%,
            100% {
                transform: scale(0);
            }

            40% {
                transform: scale(1);
            }
        }
    </style>
</head>

<body>

    <div class="app-container">
        <h1>📚 NotebookLM</h1>

        <div class="upload-card">
            <input type="file" id="pdfFile" accept=".pdf">
            <button onclick="uploadFile()" id="uploadBtn">Index Document</button>
        </div>
        <div id="uploadStatus" class="status-text text-center" style="text-align: center;"></div>

        <div class="chat-card" id="chatArea">
            <div class="chat-history" id="messages">
            </div>

            <div class="chat-input-area">
                <input type="text" id="query" placeholder="Ask a question about your document..."
                    onkeypress="handleEnter(event)">
                <button onclick="askQuestion()" id="askBtn">Send</button>
            </div>
        </div>
    </div>

    <script>
        async function uploadFile() {
            const file = document.getElementById('pdfFile').files[0];
            if (!file) return alert("Please select a PDF file first.");

            const btn = document.getElementById('uploadBtn');
            const status = document.getElementById('uploadStatus');
            btn.disabled = true;
            btn.innerText = "Indexing...";
            status.innerText = "Extracting and embedding text, please wait...";

            const formData = new FormData();
            formData.append('pdf', file);

            try {
                const res = await fetch('/upload', { method: 'POST', body: formData });
                const data = await res.json();

                if (res.ok) {
                    status.innerText = "✅ Document ready! You can now chat.";
                    status.style.color = "#10B981";
                    document.getElementById('chatArea').style.display = 'flex';
                } else {
                    status.innerText = "❌ Error: " + data.error;
                    status.style.color = "#EF4444";
                }
            } catch (error) {
                status.innerText = "❌ Network Error.";
            }
            btn.disabled = false;
            btn.innerText = "Index Document";
        }

        function handleEnter(event) {
            if (event.key === 'Enter') askQuestion();
        }

        async function askQuestion() {
            const queryInput = document.getElementById('query');
            const query = queryInput.value.trim();
            const messages = document.getElementById('messages');
            const askBtn = document.getElementById('askBtn');

            if (!query) return;

            messages.innerHTML += `
                <div class="message-row user">
                    <div class="bubble user">${query}</div>
                </div>
            `;
            queryInput.value = "";
            queryInput.disabled = true;
            askBtn.disabled = true;
            messages.scrollTop = messages.scrollHeight;

            const loadingId = "loading-" + Date.now();
            messages.innerHTML += `
                <div class="message-row ai" id="${loadingId}">
                    <div class="bubble ai">
                        <div class="typing-indicator">
                            <div class="dot"></div>
                            <div class="dot"></div>
                            <div class="dot"></div>
                        </div>
                    </div>
                </div>
            `;
            messages.scrollTop = messages.scrollHeight;

            try {
                const res = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query })
                });
                const data = await res.json();

                document.getElementById(loadingId).remove();

                const formattedAnswer = marked.parse(data.answer);
                messages.innerHTML += `
                    <div class="message-row ai">
                        <div class="bubble ai markdown-body">${formattedAnswer}</div>
                    </div>
                `;
            } catch (error) {
                document.getElementById(loadingId).remove();
                messages.innerHTML += `
                    <div class="message-row ai">
                        <div class="bubble ai" style="color: red;">Error fetching response.</div>
                    </div>
                `;
            }

            queryInput.disabled = false;
            askBtn.disabled = false;
            queryInput.focus();
            messages.scrollTop = messages.scrollHeight;
        }
    </script>
</body>

</html>
